name: Maestro Guard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install and run checks
        run: |
          pip install -e .
          maestro-guard check tests/fixtures/good.html
          maestro-guard check tests/fixtures/bad.html
