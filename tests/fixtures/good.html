<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Valid Page</title>
</head>
<body>
  <div id="app"></div>
  <div id="output"></div>

  <script>
    function greet(name) {
      var app = document.getElementById('app');
      var output = document.getElementById('output');
      app.innerHTML = 'Hello, ' + name + '!';
      output.textContent = 'Greeting completed.';
      return true;
    }

    function init() {
      var app = document.getElementById('app');
      app.style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', function() {
      init();
      greet('World');
    });
  </script>
</body>
</html>
